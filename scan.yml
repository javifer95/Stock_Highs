name: Daily outperformance scan

# Runs after the US market close. Cron is UTC and GitHub does NOT adjust for
# daylight saving, so this fires at 22:00 UTC year-round:
#   - EDT (summer): 6:00 PM ET   - EST (winter): 5:00 PM ET
# Enough lag for Yahoo's end-of-day data to settle. Weekdays only.
# You can also trigger it by hand from the Actions tab (workflow_dispatch).

on:
  schedule:
    - cron: "0 22 * * 1-5"
  workflow_dispatch: {}

concurrency:
  group: scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      # Carry the price-history cache between runs. The first few runs backfill
      # the whole market a couple thousand names at a time; afterwards each run
      # only refreshes the liquid names. restore-keys grabs the most recent
      # cache; a fresh dated key is saved at the end of each run.
      - name: Restore price cache
        uses: actions/cache@v4
        with:
          path: cache
          key: prices-${{ github.run_id }}
          restore-keys: |
            prices-

      - name: Run scanner
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          NTFY_SERVER: ${{ secrets.NTFY_SERVER }}   # optional; defaults to https://ntfy.sh
        run: python scan.py
